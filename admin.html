<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{background:#f7f8fa;padding:20px}
.title{text-align:center;font-size:32px;font-weight:bold;margin-bottom:24px}
.card{background:#fff;border-radius:16px;padding:24px;max-width:400px;margin:0 auto;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
input{width:100%;padding:16px;margin-bottom:12px;border:1px solid #e5e7eb;border-radius:10px;font-size:16px}
button{width:100%;padding:16px;border:none;border-radius:10px;font-size:17px;margin-top:6px;color:#fff}
.add{background:#2196f3}
.del{background:#f44336}
.result{margin-top:18px;padding:16px;background:#f5f7fa;border-radius:10px;line-height:1.9}
</style>
</head>
<body>
<div class="title">后台管理</div>
<div class="card">
<input id="name" placeholder="商品名称" autocomplete="off">
<input id="cost" placeholder="进货价" autocomplete="off">
<input id="wholesale" placeholder="批发价" autocomplete="off">
<input id="retail" placeholder="零售价" autocomplete="off">
<button class="add" onclick="addGood()">添加商品</button>

<div style="margin:20px 0"></div>

<input id="delName" placeholder="要删除的商品名称" autocomplete="off">
<button class="del" onclick="delGood()">删除商品</button>

<div class="result" id="res"></div>
</div>

<script>
// 读取本地存储的商品数据
function getData() {
  try {
    let str = localStorage.getItem("goodsData");
    return str ? JSON.parse(str) : {};
  } catch (e) {
    return {};
  }
}

// 保存商品数据到本地存储
function saveData(data) {
  localStorage.setItem("goodsData", JSON.stringify(data));
}

// 强制清空所有输入框
function clearInputs() {
  document.getElementById("name").value = "";
  document.getElementById("cost").value = "";
  document.getElementById("wholesale").value = "";
  document.getElementById("retail").value = "";
  document.getElementById("delName").value = "";
}

// 页面加载后立刻清空，防止浏览器自动填充
window.onload = function() {
  setTimeout(clearInputs, 100);
};

function addGood() {
  let name = document.getElementById("name").value.trim();
  let cost = document.getElementById("cost").value.trim();
  let wholesale = document.getElementById("wholesale").value.trim();
  let retail = document.getElementById("retail").value.trim();

  if (!name || !cost || !wholesale || !retail) {
    alert("请填写完整！");
    return;
  }

  let data = getData();
  // 这里和前台完全对齐：用商品名做key，存{name, cost, wholesale, retail}
  data[name] = {
    name: name,
    cost: cost,
    wholesale: wholesale,
    retail: retail
  };
  saveData(data); // 保存到本地

  clearInputs();
  alert("添加成功！前台刷新即可查询～");
}

function delGood() {
  let name = document.getElementById("delName").value.trim();
  if (!name) { alert("请输入要删除的商品名"); return; }

  let data = getData();
  if (!data[name]) { alert("商品不存在"); return; }
  delete data[name];
  saveData(data); // 保存到本地

  document.getElementById("delName").value = "";
  alert("删除成功！");
}
</script>
</body>
</html>
