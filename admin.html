<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#f7f8fa;padding:20px}
.title{text-align:center;font-size:28px;margin-bottom:24px}
.card{background:#fff;border-radius:16px;padding:24px;max-width:400px;margin:0 auto;box-shadow:0 3px 12px rgba(0,0,0,0.08)}
input{width:100%;padding:16px;margin-bottom:12px;border:1px solid #eee;border-radius:10px;font-size:16px}
button{width:100%;padding:16px;border:none;border-radius:10px;font-size:17px;margin-top:6px;background:#007bff;color:#fff}
.delBtn{background:#ff4444}
.searchResult{margin-top:12px;padding:12px;background:#f5f5f5;border-radius:8px}
.item{padding:8px 0}
</style>
</head>
<body>
<div class="title">后台管理</div>
<div class="card">

<input id="name" placeholder="商品名称" autocomplete="off">
<input id="cost" placeholder="进货价">
<input id="wholesale" placeholder="批发价">
<input id="retail" placeholder="零售价">
<button onclick="addGood()">添加商品</button>

<br><br>
<input id="searchName" placeholder="搜索要删除的商品（支持模糊）" autocomplete="off">
<button onclick="searchGoods()">搜索商品</button>

<div id="searchResult" class="searchResult"></div>

</div>

<script>
const API_URL = "http://47.103.37.228/api/goods";

async function getData() {
  let res = await fetch(API_URL);
  return await res.json() || {};
}

async function saveData(data) {
  await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });
}

function clearAddForm() {
  document.getElementById("name").value = "";
  document.getElementById("cost").value = "";
  document.getElementById("wholesale").value = "";
  document.getElementById("retail").value = "";
}

window.onload = function () {
  clearAddForm();
  document.getElementById("searchName").value = "";
};

async function addGood() {
  const name = document.getElementById("name").value.trim();
  const cost = document.getElementById("cost").value.trim();
  const wholesale = document.getElementById("wholesale").value.trim();
  const retail = document.getElementById("retail").value.trim();

  if (!name || !cost || !wholesale || !retail) {
    alert("请填写完整");
    return;
  }

  const data = await getData();
  data[name] = { name, cost, wholesale, retail };
  await saveData(data);

  clearAddForm();
  alert("添加成功！已保存到你的服务器");
}

async function searchGoods() {
  const kw = document.getElementById("searchName").value.trim();
  const data = await getData();
  const res = document.getElementById("searchResult");

  if (!kw) {
    res.innerHTML = "请输入关键词";
    return;
  }

  let html = "";
  let found = false;
  for (let key in data) {
    if (key.includes(kw)) {
      found = true;
      const g = data[key];
      html += `
<div class="item">
${g.name}<br>
进货：${g.cost} 批发：${g.wholesale} 零售：${g.retail}<br>
<button class="delBtn" onclick="delGood('${g.name}')">删除该商品</button>
</div>
<hr>
`;
    }
  }
  res.innerHTML = found ? html : "未找到商品";
}

async function delGood(name) {
  if (!confirm("确定删除：" + name + "？")) return;
  const data = await getData();
  delete data[name];
  await saveData(data);
  alert("删除成功！");
  searchGoods();
}
</script>
</body>
</html>
