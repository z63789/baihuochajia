<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老李床上用品</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f7f8fa;
            padding: 20px;
        }

        /* 顶部标题 */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
        }

        /* 整体布局：左侧菜单 + 右侧内容 */
        .container {
            display: flex;
            gap: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* 左侧按钮栏 */
        .sidebar {
            width: 120px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar button {
            padding: 16px 10px;
            border: none;
            border-radius: 12px;
            background: #ffffff;
            color: #333;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: 0.2s;
        }

        .sidebar button.active {
            background: #409eff;
            color: #fff;
        }

        /* 右侧内容卡片 */
        .content {
            flex: 1;
            background: #ffffff;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }

        .content h3 {
            font-size: 18px;
            color: #2c3e50;
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 12px;
            border: 1px solid #e4e7ed;
            border-radius: 8px;
            font-size: 15px;
            background: #fafbfc;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            background: #409eff;
            color: #fff;
            font-size: 16px;
            margin-top: 6px;
        }

        .result {
            margin-top: 18px;
            padding: 16px;
            background: #f5f7fa;
            border-radius: 10px;
            line-height: 1.9;
            font-size: 15px;
        }

        .del-btn {
            background: #f56c6c;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
        }

        /* 面板切换 */
        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="title">老李床上用品</div>
    </div>

    <div class="container">
        <div class="sidebar">
            <button class="active" onclick="show('addPanel')">添加商品</button>
            <button onclick="show('searchPanel')">查询商品</button>
        </div>

        <div class="content">
            <!-- 添加面板 -->
            <div id="addPanel" class="panel active">
                <h3>添加商品信息</h3>
                <input type="text" id="name" placeholder="商品名称">
                <input type="text" id="cost" placeholder="进货价">
                <input type="text" id="wholesale" placeholder="批发价">
                <input type="text" id="retail" placeholder="零售价">
                <button class="btn-submit" onclick="add()">确认添加</button>
            </div>

            <!-- 查询面板 -->
            <div id="searchPanel" class="panel">
                <h3>查询商品价格</h3>
                <input type="text" id="searchText" placeholder="输入商品名称">
                <button class="btn-submit" onclick="find()">立即查询</button>
                <div class="result" id="res"></div>
            </div>
        </div>
    </div>

<script>
let goods = JSON.parse(localStorage.getItem('goodsData')) || {};

// 切换面板
function show(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.sidebar button').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
}

// 添加商品
function add() {
    let name = document.getElementById('name').value.trim();
    let cost = document.getElementById('cost').value.trim();
    let wholesale = document.getElementById('wholesale').value.trim();
    let retail = document.getElementById('retail').value.trim();

    if (!name || !cost || !wholesale || !retail) {
        alert('请填写完整信息！');
        return;
    }

    goods[name] = { cost, wholesale, retail };
    localStorage.setItem('goodsData', JSON.stringify(goods));

    document.getElementById('name').value = '';
    document.getElementById('cost').value = '';
    document.getElementById('wholesale').value = '';
    document.getElementById('retail').value = '';

    alert('添加成功！');
}

// 查询商品
function find() {
    let s = document.getElementById('searchText').value.trim();
    let r = document.getElementById('res');

    if (!s) {
        r.innerHTML = '请输入商品名称';
        return;
    }

    if (!goods[s]) {
        r.innerHTML = '未找到该商品';
        return;
    }

    r.innerHTML = `
商品名称：${s}<br>
进货价：${goods[s].cost}<br>
批发价：${goods[s].wholesale}<br>
零售价：${goods[s].retail}
<br>
<button class="del-btn" onclick="del('${s}')">删除该商品</button>
    `;
}

// 删除商品
function del(name) {
    if (confirm('确定要删除「' + name + '」吗？')) {
        delete goods[name];
        localStorage.setItem('goodsData', JSON.stringify(goods));
        document.getElementById('res').innerHTML = '已删除';
    }
}
</script>

</body>
</html>
