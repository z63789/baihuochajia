<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老李床上用品</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{background:#f7f8fa;padding:20px}

.title{
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  color: #2c3e50;
  margin-bottom: 24px;
}

.box{
  background:#fff;
  border-radius:14px;
  padding:24px;
  max-width:400px;
  margin:0 auto;
  box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:14px;
  border:1px solid #e4e7ed;
  border-radius:8px;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:14px;
  background:#409eff;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
  margin-bottom:8px;
}

.admin-btn{
  background:#666;
}

.result{
  margin-top:20px;
  padding:18px;
  background:#f5f7fa;
  border-radius:10px;
  line-height:2;
}
</style>
</head>

<body>

<div class="title">老李床上用品</div>

<div class="box">
  <input id="kw" placeholder="输入商品名称查询">
  <button onclick="search()">查询价格</button>
  <button class="admin-btn" onclick="goAdmin()">后台管理</button>
  <div class="result" id="res"></div>
</div>

<script>
var allGoods = JSON.parse(localStorage.getItem('allGoods')) || {};

function search() {
  var kw = document.getElementById('kw').value.trim();

  if (kw === "") {
    alert("请输入商品名称");
    return;
  }

  var res = document.getElementById('res');

  if (!allGoods[kw]) {
    res.innerHTML = '未找到该商品';
    return;
  }

  res.innerHTML = `
商品名称：${kw}<br>
进货价：${allGoods[kw].cost}<br>
批发价：${allGoods[kw].wholesale}<br>
零售价：${allGoods[kw].retail}
  `;
}

function goAdmin() {
  // 弹出密码输入框
  var password = prompt("请输入后台密码");
  
  // 密码正确就进入后台
  if (password === "admin") {
    window.location.href = "admin.html";
  } else {
    alert("密码错误！");
  }
}
</script>
</body>
</html>
