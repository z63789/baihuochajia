<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百货查价</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#f7f8fa;padding:20px}
.title{text-align:center;font-size:32px;margin-bottom:24px}
.box{background:#fff;border-radius:16px;padding:24px;max-width:400px;margin:0 auto;box-shadow:0 3px 12px rgba(0,0,0,0.08)}
input{width:100%;padding:16px;margin-bottom:12px;border:1px solid #eee;border-radius:10px;font-size:16px}
button{width:100%;padding:16px;border:none;border-radius:10px;font-size:17px;margin-top:6px;background:#007bff;color:#fff}
.result{margin-top:20px;padding:16px;line-height:1.8}
</style>
</head>
<body>
<div class="title">百货查价</div>
<div class="box">
<input id="kw" placeholder="输入商品名称">
<button onclick="search()">查询商品</button>
<button onclick="goAdmin()" style="background:#666">后台管理</button>
<div id="result" class="result"></div>
</div>

<script>
const API = "https://api.yournote.space/baihuo";

async function getGoods() {
  try {
    let res = await fetch(API);
    return await res.json() || {};
  } catch (e) {
    return {};
  }
}

async function search() {
  const kw = document.getElementById("kw").value.trim();
  const res = document.getElementById("result");
  if (!kw) { alert("请输入商品名"); return; }

  const data = await getGoods();
  const list = [];
  for (let k in data) {
    if (k.includes(kw)) list.push(data[k]);
  }

  if (list.length === 0) {
    res.innerHTML = "未找到商品";
    return;
  }

  let html = "";
  list.forEach(g => {
    html += `
名称：${g.name}<br>
进货价：${g.cost}<br>
批发价：${g.wholesale}<br>
零售价：${g.retail}<br>
<hr>
`;
  });
  res.innerHTML = html;
}

function goAdmin() {
  const pwd = prompt("请输入后台密码");
  if (pwd === "123") location.href = "admin.html";
  else alert("密码错误");
}
</script>
</body>
</html>
